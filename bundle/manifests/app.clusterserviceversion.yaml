          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: app-controller-manager
    strategy: deployment
  installModes:
  - supported: false
