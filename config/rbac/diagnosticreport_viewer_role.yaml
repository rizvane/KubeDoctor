# permissions for end users to view diagnosticreports.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: diagnosticreport-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: app
    app.kubernetes.io/part-of: app
    app.kubernetes.io/managed-by: kustomize
  name: diagnosticreport-viewer-role
rules:
- apiGroups:
  - diagnostics.rizvane.com
  resources:
  - diagnosticreports
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - diagnostics.rizvane.com
  resources:
  - diagnosticreports/status
  verbs:
  - get
